<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APEC Login</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(to right, #4facfe, #00f2fe);
    font-family:Arial;
}

.box{
    background:#fff;
    padding:25px;
    border-radius:12px;
    width:320px;
    text-align:center;
    box-shadow:0 0 15px rgba(0,0,0,0.2);
}

.box img{
    width:120px;
    height:auto;
    display:block;
    margin:0 auto 10px;
}

h2{
    margin:10px 0 15px;
    color:#007bff;
}

input{
    width:100%;
    padding:10px;
    margin:8px 0;
    border:1px solid #ccc;
    border-radius:6px;
}

button{
    width:100%;
    padding:10px;
    background:#007bff;
    border:none;
    color:white;
    border-radius:6px;
    cursor:pointer;
}

button:hover{
    background:#0056b3;
}
</style>
</head>

<body>

<div class="box">

    <!-- 🔴 IMPORTANT: change filename correctly -->
    <img src="logo.png" alt="APEC Logo">

    <h2>APEC COLLEGE</h2>

    <input type="text" placeholder="Username">
    <input type="password" placeholder="Password">

    <button>Login</button>

</div>

</body>
</html>

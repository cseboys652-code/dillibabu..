<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APEC Login</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(to right, #4facfe, #00f2fe);
    font-family:Arial;
}

.login-box{
    background:white;
    padding:30px;
    border-radius:12px;
    width:320px;
    text-align:center;
    box-shadow:0 0 15px rgba(0,0,0,0.2);
}

.logo{
    width:110px;
    height:auto;
    margin-bottom:10px;
}

.title{
    font-size:22px;
    font-weight:bold;
    color:#007bff;
    margin-bottom:15px;
}

input{
    width:100%;
    padding:10px;
    margin:8px 0;
    border:1px solid #ccc;
    border-radius:6px;
}

button{
    width:100%;
    padding:10px;
    background:#007bff;
    border:none;
    color:white;
    border-radius:6px;
    cursor:pointer;
}

button:hover{
    background:#0056b3;
}
</style>
</head>

<body>

<div class="login-box">

    <!-- COLLEGE LOGO -->
    <img src="logo.png" class="logo" alt="APEC Logo">

    <!-- COLLEGE NAME -->
    <div class="title">APEC COLLEGE</div>

    <input type="text" placeholder="Username">
    <input type="password" placeholder="Password">

    <button>Login</button>

</div>

</body>
</html>
